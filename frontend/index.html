<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MedAssist AI - AI-Powered Healthcare Assistant for Rural India" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="color-scheme" content="dark" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MedAssist AI" />
    <meta property="og:title" content="MedAssist AI - AI Copilot for Rural Healthcare" />
    <meta property="og:description" content="Multi-Agent AI Healthcare Assistant for ASHA Workers, Nurses, and Rural Clinics" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>MedAssist AI - AI Healthcare Assistant</title>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script>
      (function() {
        // 1. Unregister stale service workers immediately
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            for (var i = 0; i < regs.length; i++) {
              regs[i].unregister();
            }
          });
        }
        // 2. Strip ?token= query param injected by React DevTools from all WebSocket URLs
        try {
          var iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          document.documentElement.appendChild(iframe);
          var cleanWS = iframe.contentWindow.WebSocket;
          document.documentElement.removeChild(iframe);
          if (cleanWS) {
            window.WebSocket = function(url, protocols) {
              if (typeof url === 'string') {
                url = url.replace(/[\?&]token=[^&]*/g, '');
              }
              return new cleanWS(url, protocols);
            };
            window.WebSocket.prototype = cleanWS.prototype;
            window.WebSocket.CONNECTING = 0;
            window.WebSocket.OPEN = 1;
            window.WebSocket.CLOSING = 2;
            window.WebSocket.CLOSED = 3;
          }
        } catch(e) {
          // fallback: do nothing
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
