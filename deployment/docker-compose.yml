version: "3.8"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: medassist-backend
    ports:
      - "8080:8080"
    env_file:
      - ../backend/.env
    environment:
      - QDRANT_HOST=qdrant
      - REDIS_URL=redis://redis:6379
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../backend:/app
    restart: unless-stopped
    networks:
      - medassist-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: medassist-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - medassist-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: medassist-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - medassist-network

  redis:
    image: redis:7-alpine
    container_name: medassist-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - medassist-network

  nginx:
    image: nginx:alpine
    container_name: medassist-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - medassist-network

volumes:
  qdrant_data:
  redis_data:

networks:
  medassist-network:
    driver: bridge
